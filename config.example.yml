# แม่แบบ Cloudflare Tunnel — copy เป็น config.yml แล้วปรับให้ตรงกับ tunnel ของทีม
# ต้องติดตั้ง cloudflared และมีไฟล์ credentials JSON จาก Cloudflare Dashboard

tunnel: <TUNNEL_UUID>
credentials-file: C:\Users\%USERNAME%\.cloudflared\<TUNNEL_UUID>.json

ingress:
  # hostname ที่ตั้งใน Cloudflare Zero Trust / Dashboard
  - hostname: <your-subdomain>.<your-domain>.com
    # ต้องตรงกับ PORT ใน .env (ค่ามาตรฐานโปรเจกต์ = 8088)
    service: http://localhost:8088
  - service: http_status:404
